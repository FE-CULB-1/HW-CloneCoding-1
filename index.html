<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>무신사 클론 코딩</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header>
            <div class="라벨">
                <a href="https://www.musinsa.com">MUSINSA</a>
                <a href="https://www.musinsa.com/main/beauty/recommend?gf=A">BEAUTY</a>
                <a href="https://www.musinsa.com/main/player/recommend?gf=A">PLAYER</a>
                <a href="https://www.musinsa.com/main/outlet/recommend?gf=A">OUTLET</a>
                <a href="https://www.musinsa.com/main/boutique/recommend?gf=A">BOUTIQUE</a>
                <a href="https://www.musinsa.com/main/sneaker/recommend?gf=A">SHOES</a>
            </div>
        </header>
        <main>
            <div class="로그인">
                <h2 class="로그인">로그인/회원가입</h2>
            </div>
        
            <div class="login id">
                <input type="text" class="login id" title="아이디 입력" placeholder="아이디">
            </div>
            <br>
            <div class="login pw">
                <input type="password" class="login pw" title="비밀번호 입력" placeholder="비밀번호">
            </div>
            <br>
            <div class="login button">
                <button type="submit" class="login button">로그인</button>
            </div>
            <br>

            <div class="found">
                <div class="자동 로그인">
                    <input class="자동 로그인 버튼" type="checkbox" title="자동로그인 버튼"> 자동로그인
                </div>
                <div class="find">
                    <a href = # >아이디 찾기</a>
                    <a href = # >비밀번호 찾기</a>
                </div>
            </div>
            <br>
            
            <div class="앱 로그인">
                <button id="카카오.로그인" type="submit" class="카카오 로그인 버튼">카카오 로그인</button>
                <button id="apple.로그인" type="submit" class="apple 로그인 버튼">apple 로그인</button>
            </div>
            <br>
            <div class="회원가입">
                <p class="할인">가입만 해도 즉시 20% 할인 </p> <button type="submit" class="회원가입 버튼">회원가입</button>
            </div>
            <div class="비회원 로그인">
                <p class="비회원으로 주문">비회원으로 주문하셨나요?</p> 
                <a href="https://www.musinsa.com/order/nonmember/orderlist">비회원 주문 조회</a>
            </div>
        </main>
    </body>
</html>
