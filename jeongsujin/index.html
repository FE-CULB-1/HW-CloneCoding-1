<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <title>로그인 - Google 계정</title>
    <link rel="icon" href="favicon_google.png" type="image/png">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="외부">
        <div class="all">
            <div class="위">
                <div class="왼">
                    <img src="google.png" width="44" height="44" class="logo">


                    <div class="로그인"><a>
                            <h1>로그인</h1>
                        </a>
                    </div>

                    <div class="안내문자">Google 계정으로 로그인합니다. 이 계정은 브라우저의 다른 Google 앱에서 사용할 수 있습니다.
                    </div>
                </div>

                <div class="오">
                    <div class="이메일영역">
                        <div class="입력창">
                            <input type="text" placeholder="이메일 또는 휴대전화" class="입력">
                        </div>
                        <div class="이메일">
                            <button type="button" class="이메일을잊엇니"><a href="#">이메일을 잊으셨나요?</a></button>
                        </div>
                    </div>

                    <div class="너꺼아님">
                        내 컴퓨터가 아닌가요? 게스트 모드를 사용하여 비공개로 로그인하세요. <a href="#">게스트 모드 사용 방법 자세히 알아보기</a>
                    </div>
                </div>
            </div>
            <div class="아래">
                <button type="button" class="계정">계정 만들기</button>
                <button type="button" class="다음">다음</button>
            </div>
            <br>

        </div>
        <div class="나머지">
            <div class="언어선택">
                <select>
                    <option value="한국어">한국어</option>
                </select>
            </div>
            <br>
            <ul class="세개">
                <li><a class="도움말" href="#">도움말</a></li>
                <li><a class="개인정보" href="#">개인정보처리방침</a></li>
                <li><a class="약관" href="#">약관</a></li>
            </ul>
        </div>
    </div>
</body>

</html>
