    <body>
        <header>
            <h1><a href="https://www.coupang.com/"><img src="Coupang_logo.svg.png" width="195" height="45" alt="쿠팡로고" ></a></h1>
            <h1>
                <ul>
                    <a href="index1.html" class="email">이메일 로그인</a>

        <main>
            <form action="#" method="post" id="loginfrm">

                    <ul>
                        <li>
                            <span class="id_bg"> <img src="Coupang_id.png" alt="id"> </span>

                        <li>
                            <span class="pw_bg"> <img src="Coupang_pw.png" alt="pw"> </span>

                    </ul>
                    <div class="btm">
                        <p>
                            <label>
                                <input type="checkbox" name="login_y" id="login_y">

                        </p>
                        <a href="#" class="idpw_search">아이디∙비밀번호 찾기 ></a>
                    </div>
                    <button type="submit" id="login_btn">로그인</button>
                    <hr>
                </fieldset>
            </form>
            <div class="join">
                <a href="https://login.coupang.com/login/memberJoinFrm.pang" class="join_link">회원가입</a>
            </div>
